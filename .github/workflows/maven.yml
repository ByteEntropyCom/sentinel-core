name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  # This line enables the manual "Run Workflow" button in GitHub Actions
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 25
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      # We use -DskipTests because CI environment won't have your 
      # Aiven SSL certificates or a live Kafka cluster connection.
      run: mvn -B package --file pom.xml -DskipTests
